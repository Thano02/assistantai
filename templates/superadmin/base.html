<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Super Admin — AssistantAI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#2563eb' } } } }</script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
    <div class="px-6 py-5 border-b border-gray-800">
      <p class="text-xs text-red-400 font-bold uppercase tracking-widest mb-1">Super Admin</p>
      <p class="text-white font-semibold text-sm">AssistantAI</p>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-1">
      <a href="/superadmin/dashboard"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                {% if request.url.path == '/superadmin/dashboard' %}bg-primary text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Commerces
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-800 space-y-1">
      <a href="/auth/logout"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-red-400 hover:text-red-300 hover:bg-red-900/20 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Déconnexion
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-auto">
    <header class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="font-semibold text-lg">{% block page_title %}Dashboard{% endblock %}</h1>
      <a href="/auth/logout"
         class="flex items-center gap-2 text-sm text-gray-400 hover:text-red-400 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Déconnexion
      </a>
    </header>
    <div class="px-8 py-6">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
