{% extends "base_public.html" %}
{% block title %}Connexion — AssistantAI{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Connexion</h1>
      <p class="text-gray-500 mt-2">Accédez à votre dashboard</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/auth/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            placeholder="votre@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full bg-primary hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-colors">
          Se connecter
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">
        Pas encore de compte ?
        <a href="/auth/register" class="text-primary font-medium hover:underline">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
